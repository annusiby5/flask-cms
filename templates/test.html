<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<body>

            </div>

      </div>
    </div>

            {% endif %}
            <a href="/test" class="link-button" style="margin: 20px 0px;">Add More</a>


        </div>
    </div>

    <script src="{{ url_for('static', filename='js/profilePic.js') }}"></script>
